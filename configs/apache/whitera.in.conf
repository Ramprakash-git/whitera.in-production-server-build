Listen 443 https
# HTTP - Redirect to HTTPS
<VirtualHost *:80>
    ServerName example.in
    ServerAlias www.example.in
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>

# HTTPS VirtualHost
<VirtualHost *:443>
    ServerName example.in
    ServerAlias www.example.in
    DocumentRoot /var/www/example.in/public_html

    SSLEngine on
    SSLCertificateFile /etc/ssl/example.in/fullchain.pem
    SSLCertificateKeyFile /etc/ssl/example.in/privkey.pem
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite HIGH:!aNULL:!MD5

    # Security Headers
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "no-referrer-when-downgrade"

    # Directory settings
    <Directory /var/www/example.in/public_html>
        AllowOverride All
        Options -Indexes
        Require all granted
    </Directory>

    # PHP-FPM
    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php-fpm/www.sock|fcgi://localhost"
    </FilesMatch>

    # Logging
    ErrorLog /var/log/httpd/example.in_error.log
    CustomLog /var/log/httpd/example.in_access.log combined
</VirtualHost>
